name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  demo:
    # End-to-end: the demo must run, its artifacts must validate against
    # the JSON Schema, and provenance hashes must verify against snapshots.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run demo
        run: python examples/anticoagulation/run_demo.py
      - name: Validate artifacts against schema
        run: |
          metaxu validate examples/anticoagulation/out/diligent-artifact.json
          metaxu validate examples/anticoagulation/out/careless-artifact.json
      - name: Verify provenance hashes
        run: |
          metaxu verify examples/anticoagulation/out/diligent-artifact.json \
            --snapshots examples/anticoagulation/out/snapshots
      - name: Careless artifact must FAIL policy (guard the benchmark)
        run: |
          metaxu inspect examples/anticoagulation/out/careless-artifact.json \
            | grep -q "before_anticoagulation: FAIL"
