name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  demo:
    # End-to-end: the demo must run, its artifacts must validate against
    # the JSON Schema, and provenance hashes must verify against snapshots.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run demo
        run: python examples/anticoagulation/run_demo.py
      - name: Validate artifacts against schema
        run: |
          metaxu validate examples/anticoagulation/out/diligent-artifact.json
          metaxu validate examples/anticoagulation/out/careless-artifact.json
      - name: Verify provenance hashes
        run: |
          metaxu verify examples/anticoagulation/out/diligent-artifact.json \
            --snapshots examples/anticoagulation/out/snapshots
      - name: Careless artifact must FAIL policy (guard the benchmark)
        run: |
          metaxu inspect examples/anticoagulation/out/careless-artifact.json \
            | grep -q "before_anticoagulation: FAIL"
      - name: Terminology validation runs on the diligent artifact
        run: |
          metaxu inspect examples/anticoagulation/out/diligent-artifact.json \
            | grep -q "Terminology"
          metaxu report examples/anticoagulation/out --json | python -c "
          import json, sys
          report = json.load(sys.stdin)
          # The diligent run cites real LOINC/RxNorm/UCUM codes; none malformed.
          assert report['terminology']['codes_checked'] > 0, 'no codes checked'
          assert report['terminology']['malformed'] == 0, report['terminology']
          "
      - name: Governance report aggregates the store
        run: |
          python examples/composition/run_demo.py
          metaxu report examples --json | python -c "
          import json, sys
          report = json.load(sys.stdin)
          assert report['artifact_count'] >= 5, report['artifact_count']
          assert report['needs_review'], 'careless artifact must need review'
          "
          metaxu report examples --html governance.html
          grep -q "Needs review" governance.html
      - name: Governance gate must flag the careless artifact
        run: |
          if metaxu report examples --fail-on-review; then
            echo "gate should have failed" && exit 1
          fi
      - name: Drift self-comparison must be clean
        run: metaxu drift examples examples --fail-on-drift > /dev/null
      - name: Diff must distinguish diligent from careless
        run: |
          if metaxu diff examples/anticoagulation/out/diligent-artifact.json \
               examples/anticoagulation/out/careless-artifact.json --fail-on-diff > /dev/null; then
            echo "diff should have failed" && exit 1
          fi
