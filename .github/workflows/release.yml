name: Release

# Publishes to PyPI when a version tag is pushed. Uses PyPI Trusted
# Publishing (OIDC) — no API token is stored in the repo. One-time setup
# and the release steps are documented in RELEASING.md.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build "twine>=6" "packaging>=24.2"
          python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import metaxu; print(metaxu.__version__)')"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG does not match package version $PKG" && exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
